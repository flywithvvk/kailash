<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8172AD"/>
      <stop offset="50%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#DF8C4D"/>
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8172AD;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="url(#glowGradient)" opacity="0.5"/>
  <circle cx="1100" cy="530" r="200" fill="url(#glowGradient)" opacity="0.4"/>
  
  <!-- Go4Garage badge -->
  <rect x="40" y="40" width="180" height="36" rx="18" fill="rgba(129, 114, 173, 0.2)" stroke="#8172AD" stroke-width="1"/>
  <text x="130" y="64" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#8172AD" text-anchor="middle">GO4GARAGE</text>
  
  <!-- Main Title -->
  <text x="600" y="220" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="800" fill="url(#accent)" text-anchor="middle" filter="url(#glow)">AEGIS HUB</text>
  
  <!-- Subtitle -->
  <text x="600" y="300" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="middle">KAILASH "THE DEVINE AI"</text>
  
  <!-- Tagline -->
  <text x="600" y="380" font-family="Inter, Arial, sans-serif" font-size="24" fill="#a0a0a0" text-anchor="middle">India's Most Advanced EV Charging Network</text>
  
  <!-- Features row -->
  <g transform="translate(600, 460)">
    <rect x="-340" y="-25" width="160" height="50" rx="8" fill="rgba(129, 114, 173, 0.15)" stroke="rgba(129, 114, 173, 0.3)" stroke-width="1"/>
    <text x="-260" y="8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#8172AD" text-anchor="middle">20 AI Departments</text>
    
    <rect x="-100" y="-25" width="200" height="50" rx="8" fill="rgba(76, 175, 80, 0.15)" stroke="rgba(76, 175, 80, 0.3)" stroke-width="1"/>
    <text x="0" y="8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#4CAF50" text-anchor="middle">64 Sub-Agents</text>
    
    <rect x="180" y="-25" width="160" height="50" rx="8" fill="rgba(223, 140, 77, 0.15)" stroke="rgba(223, 140, 77, 0.3)" stroke-width="1"/>
    <text x="260" y="8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#DF8C4D" text-anchor="middle">Smart Operations</text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="300" y="560" width="600" height="4" fill="url(#accent)" rx="2"/>
  
  <!-- Bottom text -->
  <text x="600" y="600" font-family="Inter, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="middle">Powered by URGAA EV Charging Technology</text>
</svg>
