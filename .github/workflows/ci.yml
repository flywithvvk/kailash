name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff==0.5.0
      - run: ruff check backend

  shared:
    name: Shared library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi pydantic pydantic-settings
      - run: PYTHONPATH=. pytest -q tests/platform

  services:
    name: Service · ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: shared
    strategy:
      fail-fast: false
      matrix:
        service:
          - document-ai
          - forecasting
          - anomaly
          - rag
          - vision-gateway
          - speech
          - model-registry
          - knowledge-graph
          - automobile-llm
    defaults:
      run:
        working-directory: backend/services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx python-multipart
      - name: Test
        run: PYTHONPATH=../../.. pytest -q

  backend:
    name: Kailash backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Backend smoke tests
        run: |
          if [ -d ../tests/backend ]; then
            pip install pytest
            PYTHONPATH=.. pytest ../tests/backend -q || true
          fi

  frontend:
    name: Kailash frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - run: yarn install --frozen-lockfile || yarn install
      - run: yarn build || true

  compose-build:
    name: Compose build (sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose -f docker-compose.yml build --pull
