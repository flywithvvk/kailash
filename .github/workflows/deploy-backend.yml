name: Deploy Backend → Vultr

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'deploy/docker/docker-compose.prod.yml'
      - 'deploy/vultr/**'
  workflow_dispatch:

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d ../../tests/backend ]; then
            pip install pytest
            PYTHONPATH=. pytest ../../tests/backend -q || true
          fi

  deploy:
    name: Deploy to Vultr VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vultr via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          port: ${{ secrets.VULTR_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/kailash

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # Rebuild and restart containers
            docker compose -f deploy/docker/docker-compose.prod.yml up -d --build --remove-orphans

            # Wait and health check
            sleep 15
            curl -sf http://127.0.0.1:8000/api/health || {
              echo "Health check failed!"
              docker compose -f deploy/docker/docker-compose.prod.yml logs --tail=50 backend
              exit 1
            }

            echo "✅ Deployment successful!"
            docker compose -f deploy/docker/docker-compose.prod.yml ps
