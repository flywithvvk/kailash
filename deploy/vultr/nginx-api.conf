# Nginx Reverse Proxy for KAILASH Backend on Vultr
# Place at: /etc/nginx/sites-available/kailash-api

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

upstream kailash_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.kailash-ai.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.kailash-ai.in;

    ssl_certificate     /etc/letsencrypt/live/api.kailash-ai.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kailash-ai.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy            strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 50M;

    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
    }

    location /health {
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    location /api/docs {
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/openapi.json {
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://kailash_backend;
        include /etc/nginx/proxy_params;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/kailash-api.access.log;
    error_log  /var/log/nginx/kailash-api.error.log warn;
}
