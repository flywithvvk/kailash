# Kailash — Production Docker Compose
# Usage: docker compose up -d

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kailash-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - backend/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DATABASE_NAME=kailash
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://kailash:${POSTGRES_PASSWORD:-kailash_prod_2026}@postgres:5432/kailash
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kailash-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  mongo:
    image: mongo:7
    container_name: kailash-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - kailash-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: kailash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kailash
      POSTGRES_USER: kailash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kailash_prod_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kailash-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kailash"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: kailash-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - kailash-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  kailash-network:
    driver: bridge

volumes:
  mongo_data:
  mongo_config:
  postgres_data:
  redis_data:
